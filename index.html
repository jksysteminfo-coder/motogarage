function IMMS__flipBrandGridUpdate(apply){
  try{
    const grid=document.querySelector(".imms-brand-grid");
    if(!grid){apply&&apply();return}
    const cards=[...grid.querySelectorAll(".imms-brand-card")];
    const first=new Map(cards.map(el=>[el.dataset.brandId,el.getBoundingClientRect()]));
    apply&&apply();
    requestAnimationFrame(()=>{
      requestAnimationFrame(()=>{
        const next=[...grid.querySelectorAll(".imms-brand-card")];
        next.forEach(el=>{
          const a=first.get(el.dataset.brandId),b=el.getBoundingClientRect();
          if(!a)return;
          const dx=a.left-b.left,dy=a.top-b.top;
          if(dx||dy){
            el.classList.add("imms-brand-sliding");
            el.style.transition="none";
            el.style.transform=`translate(${dx}px,${dy}px)`;
            el.getBoundingClientRect();
            el.style.transition="transform 320ms cubic-bezier(.22,1,.36,1), box-shadow 180ms ease, border-color 180ms ease, opacity 140ms ease";
            el.style.transform="";
            setTimeout(()=>el.classList.remove("imms-brand-sliding"),340);
          }
        });
      });
    });
  }catch(_){apply&&apply()}
}


function IMMS__brandRects(){
  const grid=document.querySelector(".imms-brand-grid");
  const cards=grid?[...grid.querySelectorAll(".imms-brand-card")]:[];
  return new Map(cards.map(el=>[el.dataset.brandId,{el,rect:el.getBoundingClientRect()}]));
}
function IMMS__playBrandFlip(first){
  requestAnimationFrame(()=>{
    const grid=document.querySelector(".imms-brand-grid");
    if(!grid)return;
    const cards=[...grid.querySelectorAll(".imms-brand-card")];
    cards.forEach(el=>{
      const old=first.get(el.dataset.brandId);
      if(!old)return;
      const now=el.getBoundingClientRect();
      const dx=old.rect.left-now.left;
      const dy=old.rect.top-now.top;
      if(Math.abs(dx)>0.5||Math.abs(dy)>0.5){
        el.classList.add("imms-brand-flip-moving");
        el.style.transition="none";
        el.style.transform=`translate(${dx}px, ${dy}px)`;
        el.getBoundingClientRect();
        el.style.transition="transform 360ms cubic-bezier(.16,1,.3,1), box-shadow 180ms ease, border-color 180ms ease, opacity 140ms ease";
        el.style.transform="translate(0,0)";
        setTimeout(()=>{
          el.classList.remove("imms-brand-flip-moving");
          el.style.transition="";
          el.style.transform="";
        },390);
      }
    });
  });
}
function IMMS__flushBrandList(setList,next){
  if(window.ReactDOM&&typeof ReactDOM.flushSync==="function")ReactDOM.flushSync(()=>setList(next));
  else setList(next);
}
function IMMS__brandPointerReorder(state){
  const {event,brand,list,setList,setDragging,setOver,saveOrder}=state;
  event.preventDefault();
  event.stopPropagation();
  const grid=document.querySelector(".imms-brand-grid");
  const src=event.currentTarget;
  if(!grid||!src)return;

  const id=brand.id;
  const startRect=src.getBoundingClientRect();
  const startX=event.clientX,startY=event.clientY;
  let current=list.slice();
  let lastTarget=id;
  let lastMoveTime=0;

  setDragging(id);
  setOver(null);

  /* Floating preview only while dragging, so user clearly sees the card being carried. */
  const ghost=src.cloneNode(true);
  ghost.classList.add("imms-brand-drag-preview");
  ghost.style.position="fixed";
  ghost.style.left=startRect.left+"px";
  ghost.style.top=startRect.top+"px";
  ghost.style.width=startRect.width+"px";
  ghost.style.height=startRect.height+"px";
  ghost.style.zIndex="99999";
  ghost.style.pointerEvents="none";
  ghost.style.transform="translate(0,0) scale(1.02)";
  ghost.style.transition="none";
  document.body.appendChild(ghost);
  src.classList.add("imms-brand-source-hidden");

  try{src.setPointerCapture&&src.setPointerCapture(event.pointerId)}catch(_){}

  const targetFromPoint=(e)=>{
    const x=e.clientX,y=e.clientY;
    const cards=[...document.querySelectorAll(".imms-brand-card")].filter(el=>el.dataset.brandId!==id&&!el.classList.contains("imms-brand-drag-preview"));
    let target=null;
    for(const card of cards){
      const r=card.getBoundingClientRect();
      if(x>=r.left&&x<=r.right&&y>=r.top&&y<=r.bottom){target=card;break}
    }
    if(target)return target;
    let nearest=null,dist=Infinity;
    cards.forEach(card=>{
      const r=card.getBoundingClientRect();
      const cx=r.left+r.width/2,cy=r.top+r.height/2;
      const d=Math.hypot(x-cx,y-cy);
      if(d<dist){dist=d;nearest=card}
    });
    return dist<160?nearest:null;
  };

  const reorderTo=(targetId)=>{
    const from=current.findIndex(b=>b.id===id);
    const to=current.findIndex(b=>b.id===targetId);
    if(from<0||to<0||from===to)return;
    const first=IMMS__brandRects();
    const next=current.slice();
    const item=next.splice(from,1)[0];
    next.splice(to,0,item);
    current=next;
    IMMS__flushBrandList(setList,next);
    IMMS__playBrandFlip(first);
  };

  const move=(e)=>{
    const dx=e.clientX-startX,dy=e.clientY-startY;
    ghost.style.transform=`translate(${dx}px, ${dy}px) scale(1.02)`;
    const now=performance.now();
    if(now-lastMoveTime<40)return;
    lastMoveTime=now;
    const target=targetFromPoint(e);
    const targetId=target&&target.dataset.brandId;
    if(targetId&&targetId!==lastTarget){
      lastTarget=targetId;
      setOver(targetId);
      reorderTo(targetId);
    }
  };

  const finish=async()=>{
    window.removeEventListener("pointermove",move);
    window.removeEventListener("pointerup",finish);
    window.removeEventListener("pointercancel",finish);
    try{src.releasePointerCapture&&src.releasePointerCapture(event.pointerId)}catch(_){}
    ghost.style.transition="opacity 120ms ease, transform 120ms ease";
    ghost.style.opacity="0";
    ghost.style.transform=ghost.style.transform+" scale(.98)";
    setTimeout(()=>ghost.remove(),130);
    document.querySelectorAll(".imms-brand-source-hidden").forEach(el=>el.classList.remove("imms-brand-source-hidden"));
    setDragging(null);
    setOver(null);
    if(saveOrder)await saveOrder(current);
  };

  window.addEventListener("pointermove",move);
  window.addEventListener("pointerup",finish);
  window.addEventListener("pointercancel",finish);
}
function IMMS__animateBrandGrid(){
  try{
    const grid=document.querySelector(".imms-brand-grid");
    if(!grid)return;
    const cards=[...grid.querySelectorAll(".imms-brand-card")];
    const first=new Map(cards.map(el=>[el.dataset.brandId,el.getBoundingClientRect()]));
    requestAnimationFrame(()=>{
      const next=[...grid.querySelectorAll(".imms-brand-card")];
      next.forEach(el=>{
        const a=first.get(el.dataset.brandId),b=el.getBoundingClientRect();
        if(!a)return;
        const dx=a.left-b.left,dy=a.top-b.top;
        if(dx||dy){
          el.style.transition="none";
          el.style.transform=`translate(${dx}px,${dy}px)`;
          el.getBoundingClientRect();
          el.style.transition="transform 260ms cubic-bezier(.22,1,.36,1), box-shadow 180ms ease, border-color 180ms ease, opacity 120ms ease";
          el.style.transform="";
        }
      });
    });
  }catch(_){}
}
